cv:
  name: Gitaek Kwon
  label: AI Researcher — Medical Imaging · Computer Vision
  email: kwongitack@gmail.com
  location: Yongin, Republic of Korea
  image: ""
  summary: AI researcher with 5+ years of industry experience in medical imaging. Developed and shipped deep learning models for retinal fundus screening products, while publishing research on out-of-distribution detection, generative data augmentation, and label-efficient learning.

  social_networks:
    - network: GitHub
      username: anears
    - network: LinkedIn
      username: gitaek

  sections:
    Education:
      - institution: Hanyang University
        location: Seoul, Republic of Korea
        area: Computer Software (Computer Vision Lab, advised by Prof. Jongwoo Lim)
        studyType: M.S.
        start_date: 2019-03
        end_date: 2021-02
        highlights:
          - Research on object detection, tracking, domain generalization, and deep hashing.
          - Co-authored ICLR 2020 paper on domain generalization; co-first author of Scientific Reports 2020 paper on paediatric intussusception detection.

      - institution: Hanyang University
        location: Seoul, Republic of Korea
        area: Software
        studyType: B.S.
        start_date: 2015-03
        end_date: 2019-02
        score: "GPA 3.71/4.5 (major 3.83/4.5)"
        highlights:
          - ACM-ICPC Korea Regional — Bronze medal, 10th place (2016).
          - President of the algorithm club ALOHA (2017) — organized curriculum, camps, and the campus programming contest (HCPC).

    Experience:
      - company: VUNO, Inc.
        position: AI Researcher (R&D Division, Fundus Team)
        location: Seoul, Republic of Korea
        start_date: 2021-03
        end_date: 2026-07
        summary: Developed deep learning models for the retinal fundus screening products VUNO Med-Fundus AI (on the market) and VUNO Med-Fundus Pro (upcoming), from model development and validation to release engineering. Served as Technical Research Personnel (military service alternative) from Mar 2021 to Mar 2024.
        highlights:
          - Upgraded the finding-classification models for the v1.2 product release — AUROC +1.48%, AUPRC +2.22%, training time reduced from 15 days to 8 hours.
          - Redesigned the input-filtering (out-of-distribution) model from one-class to binary classification — false rejections of normal images reduced from 1,359 to 21, specificity 0.9806 → 0.9997.
          - Developed disease classification (DR/AMD/RVO), lesion quantification, and integrated vessel/localization models for the upcoming product.
          - Built generative models for fundus image synthesis — text-conditioned synthesis at 1.2M-image scale (synthetic-only training on par with real-only), and mask-conditioned two-stage synthesis with LoRA fine-tuning for a 54-image lesion segmentation task (AUPRC +1.75).
          - Packaged inference runtimes as Docker images with Celery+Redis asynchronous workers for handoff to the product team; built and maintained CI/CD release pipelines with model-weight encryption; applied ONNX/OpenVINO conversion and INT8 quantization.
          - Led the team for the JustRAIGS glaucoma challenge (ISBI 2024, 1st place overall); first-authored and ran the experiments for the DRAC challenge (MICCAI 2022, 1st place in all three tasks).
          - Participated in clinical validation studies (multi-hospital reader study, confirmatory clinical trial) supporting regulatory approval.
          - Built an internal LangGraph-based multi-agent research automation harness.

    Awards:
