        date: 2024-05
        awarder: ISBI 2024
        summary: Ranked 1st overall. Led the team — direction setting and standardization of the collaborative experiment pipeline.

      - title: 1st place (all three tasks) — Diabetic Retinopathy Analysis Challenge (DRAC)
