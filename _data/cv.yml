cv:
  name: 권기택 (Gitaek Kwon)
  label: AI 연구원 — 의료영상 · 컴퓨터비전
  email: kwongitack@gmail.com
  location: 경기도 용인시
  image: ""
  summary: 의료영상 분야에서 5년 이상의 산업체 경력을 가진 AI 연구자. 안저 스크리닝 제품에 탑재되는 딥러닝 모델을 개발·배포했으며, OOD 탐지·생성모델 기반 데이터 증강·라벨 효율적 학습을 연구했습니다.

  social_networks:
    - network: GitHub
      username: anears
    - network: LinkedIn
      username: gitaek

  sections:
    학력:
      - institution: 한양대학교 대학원
        location: 서울
        area: 컴퓨터소프트웨어학과 (컴퓨터비전 연구실, 지도교수 임종우)
        studyType: 석사 (M.S.)
        start_date: 2019-03
        end_date: 2021-02
        highlights:
          - 물체 검출·추적, 도메인 일반화, 딥 해싱 연구.
          - ICLR 2020 논문 공저, Scientific Reports 2020 소아 장중첩증 검출 논문 공동 1저자.

      - institution: 한양대학교
        location: 서울
        area: 소프트웨어전공
        studyType: 학사 (B.S.)
        start_date: 2015-03
        end_date: 2019-02
        score: "GPA 3.71/4.5 (전공 3.83/4.5)"
        highlights:
          - ACM-ICPC 한국 지역 본선 동상 — 10위 (2016).
          - 알고리즘 동아리 ALOHA 회장 (2017) — 커리큘럼·캠프·교내 프로그래밍 대회(HCPC) 기획·운영.

    경력:
      - company: 뷰노 (VUNO, Inc.)
        position: AI 연구원 (연구개발본부 / Fundus 팀)
        location: 서울
        start_date: 2021-03
        end_date: 2026-07
        summary: 상용 안저 스크리닝 제품 VUNO Med-Fundus AI와 출시 예정 제품 VUNO Med-Fundus Pro에 탑재되는 딥러닝 모델을 개발·검증부터 릴리즈 엔지니어링까지 담당. 2021.03–2024.03 전문연구요원 복무.
        highlights:
          - v1.2 제품 릴리즈 대상 소견 분류 모델 고도화 — AUROC +1.48%, AUPRC +2.22%, 학습 시간 15일 → 8시간 단축.
          - 입력 필터링(OOD) 모델을 one-class에서 binary 분류로 재설계 — 정상 영상 오탈락 1,359장 → 21장, 특이도 0.9806 → 0.9997.
          - 차기 제품용 질환 분류(DR/AMD/RVO)·병변 정량화·혈관/위치 통합 모델 개발.
          - 안저 영상 합성 생성모델 개발 — 텍스트 조건 합성 약 120만 장 규모(합성 데이터 단독 학습이 실데이터 단독 학습과 대등), 라벨 54장뿐인 병변 분할 태스크에는 마스크 조건 Two-Stage 합성(LoRA 미세조정)으로 AUPRC +1.75%p 개선.
          - Celery+Redis 비동기 추론 워커를 Docker 이미지로 패키징해 제품 개발팀에 전달, CI/CD 릴리즈 파이프라인 구축·유지보수(모델 가중치 암호화 포함), ONNX/OpenVINO 변환·INT8 양자화 적용.
          - JustRAIGS 녹내장 챌린지(ISBI 2024) 팀 리드 — 종합 1위. DRAC 챌린지(MICCAI 2022) 1저자·실험 주도 — 3개 태스크 전부 1위.
          - 인허가를 위한 임상 검증(다기관 Reader Study, 확증 임상시험) 참여.
          - LangGraph 기반 멀티에이전트 연구 자동화 harness 구축.

    수상:
      - title: JustRAIGS 챌린지 종합 1위 (Justified Referral in AI Glaucoma Screening)
        date: 2024-05
        awarder: ISBI 2024
        summary: 팀 리드 — 기술 방향 설정과 협업 실험 파이프라인 표준화를 주도.

      - title: DRAC 챌린지 3개 태스크 전부 1위 (Diabetic Retinopathy Analysis Challenge)
        date: 2022-09
        awarder: MICCAI 2022
        summary: 1저자로서 실험 주도.

      - title: ACM-ICPC 한국 지역 본선 동상 (10위)
        date: 2016-11
        awarder: ACM
        summary: 국제 대학생 프로그래밍 대회 (ICPC) 한국 본선.

    특허:
      - title: 병변 정보 제공 방법 및 장치
        date: 2023-12
        awarder: 특허청 — 출원 10-2023-0184784
        summary: 공동발명. 소견-질환 진단 시스템 관련.

      - title: 이미지의 스타일을 전이하는 방법 및 이를 위한 장치
        date: 2023-10
        awarder: 특허청 — 등록 10-2592666
        summary: 공동발명. 안저 영상 합성 생성모델 관련.

      - title: 하드 네거티브 마이닝을 이용한 객체 추적 방법
        date: 2021-03
        awarder: 특허청 — 등록 10-2224101
        summary: 공동발명. 석사 객체 추적 연구 기반.

    스킬:
      - name: 딥러닝 / 컴퓨터비전
        icon: fa-solid fa-hashtag
        keywords: "분류·분할·검출, OOD 탐지, 준지도/자기지도학습, diffusion 기반 영상 합성 — PyTorch"

      - name: ML 엔지니어링
        icon: fa-solid fa-hashtag
        keywords: "Docker 추론 런타임 패키징, Celery+Redis 비동기 워커, CI/CD (GitHub Actions)·모델 가중치 암호화, ONNX/OpenVINO 변환, INT8 양자화"

      - name: 프로그래밍
        icon: fa-solid fa-hashtag
        keywords: "Python, C++ (알고리즘 — ACM-ICPC)"

    어학:
      - name: 한국어
        summary: "모국어"

      - name: 영어
        summary: "기술 문서 독해·작성 (연구 논문)"

      - name: 일본어
        summary: "JLPT N3 (2024)"
